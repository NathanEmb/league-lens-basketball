name: release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      image: ${{ steps.release.outputs.image }}
      should_create_tag: ${{ steps.release.outputs.should_create_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release metadata
        id: release
        run: |
          set -euo pipefail

          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          IMAGE="${IMAGE,,}"

          SEMVER_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"

            if [[ ! "$TAG" =~ $SEMVER_REGEX ]]; then
              echo "Tag $TAG is not a supported semantic version tag. Skipping release."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "should_create_tag=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            VERSION="${TAG#v}"
            SHOULD_CREATE_TAG="false"
            SHOULD_RELEASE="true"
          else
            VERSION=$(python3 - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
            )
            TAG="v$VERSION"

            if [[ ! "$TAG" =~ $SEMVER_REGEX ]]; then
              echo "pyproject.toml version $VERSION does not produce a supported semantic version tag. Skipping release."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "should_create_tag=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if git ls-remote --exit-code --refs --tags origin "refs/tags/$TAG" >/dev/null; then
              echo "Version $TAG already has a remote tag. Bump pyproject.toml to publish a new release."
              SHOULD_CREATE_TAG="false"
              SHOULD_RELEASE="false"
            else
              echo "Version $TAG is new. Building image and tagging release after a successful push."
              SHOULD_CREATE_TAG="true"
              SHOULD_RELEASE="true"
            fi
          fi

          if [[ "$TAG" == *-* ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "should_create_tag=$SHOULD_CREATE_TAG" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: prepare-release
    if: needs.prepare-release.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          TAGS="${{ needs.prepare-release.outputs.image }}:${{ needs.prepare-release.outputs.tag }}"

          if [ "${{ needs.prepare-release.outputs.is_prerelease }}" = "false" ]; then
            TAGS="$TAGS
          ${{ needs.prepare-release.outputs.image }}:latest"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-release.outputs.tag }}

      - name: Create git tag
        if: needs.prepare-release.outputs.should_create_tag == 'true'
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
