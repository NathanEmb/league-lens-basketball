name: build and push image

# Automates releases based on pyproject.toml's version:
#   1. On every push to main, check if the current version has
#      already been tagged/released.
#   2. If it's a NEW version, create the git tag (vX.Y.Z), then
#      build and push the image tagged with both the version and
#      "latest".
#   3. If the version hasn't changed, the job exits early —
#      no image is published. Bump the version to release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if this version has already been released
        id: check
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --refs --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "Version $TAG has already been released. Bump the version in pyproject.toml to publish a new image."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $TAG is new. Proceeding with release."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag release
        if: steps.check.outputs.release == 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Log in to the container registry
        if: steps.check.outputs.release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
